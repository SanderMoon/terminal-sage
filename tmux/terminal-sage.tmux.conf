# Terminal Sage theme for tmux
# Source this file from your .tmux.conf:
#   run-shell "~/.tmux/plugins/terminal-sage/terminal-sage.tmux.conf"
# Or simply: source-file /path/to/terminal-sage/tmux/terminal-sage.tmux.conf

# Status bar
set -g status-position bottom
set -g status-style "bg=#161916,fg=#8A8A7E"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[bg=#222522,fg=#7DB880,bold] #S #[bg=#161916] "
set -g status-right "#[fg=#606058]%H:%M #[fg=#8A8A7E]| #[fg=#C8C8BC]#h "

# Window tabs
set -g window-status-format "#[bg=#1C1F1C,fg=#8A8A7E] #I:#W "
set -g window-status-current-format "#[bg=#111411,fg=#7DB880,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#363A36"
set -g pane-active-border-style "fg=#7DB880"

# Message bar
set -g message-style "bg=#222522,fg=#C8C8BC"
set -g message-command-style "bg=#222522,fg=#C8C8BC"

# Copy mode
set -g mode-style "bg=#363A36,fg=#E4E4DC"
